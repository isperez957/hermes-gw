name: "Deploy — Frontend (S3 + CloudFront)"

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  pull_request:
    paths:
      - "frontend/**"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: "Build & Deploy Frontend"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'http://localhost:8080' }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::649091762015:role/terraform-ci-oidc
          aws-region: eu-west-1

      - name: Sync to S3
        if: github.event_name == 'push'
        run: |
          aws s3 sync dist/ "s3://${S3_BUCKET}" --delete --cache-control "max-age=3600"
          aws s3 cp dist/index.html "s3://${S3_BUCKET}/index.html" --cache-control "no-cache"
        env:
          S3_BUCKET: ${{ secrets.FRONTEND_S3_BUCKET }}

      - name: Invalidate CloudFront
        if: github.event_name == 'push'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${DISTRIBUTION_ID}" \
            --paths "/*"
        env:
          DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
