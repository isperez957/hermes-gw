name: Deploy Shared Skills

on:
  push:
    paths:
      - 'profiles/shared/skills/**'
  workflow_dispatch:

jobs:
  deploy-skills:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::649091762015:role/terraform-ci-oidc
          aws-region: eu-west-1

      - name: Deploy skills to EC2
        env:
          INSTANCE_ID: i-0c0f8dd5d194ceaf2
        run: |
          if [ ! -d "profiles/shared/skills" ]; then
            echo "No shared skills to deploy"
            exit 0
          fi

          echo "Skills to deploy:"
          find profiles/shared/skills -name "SKILL.md" -exec echo "  - {}" \;

          # Build a self-contained base64 script: tarball + deploy logic
          TARBALL_B64=$(tar cz profiles/shared/skills | base64 -w0)

          python3 -c "
          import subprocess, base64, json, os, time

          tarball = '''$TARBALL_B64'''

          script = f'''#!/bin/bash
          set -e
          echo === Deploying shared skills ===
          cd /tmp
          echo '{tarball}' | base64 -d | tar xz
          find profiles/shared/skills -name SKILL.md -exec echo '  {{}}' \\;
          for p in user-isaac user-miguel user-pablo; do
            d=/home/ec2-user/.hermes/profiles/\$p/skills
            mkdir -p \$d
            echo \"  -> \$p\"
            cp -rn profiles/shared/skills/* \$d/
          done
          rm -rf profiles
          echo === Done ===
          '''

          script_b64 = base64.b64encode(script.encode()).decode()

          cmd_id = subprocess.run([
              'aws', 'ssm', 'send-command',
              '--instance-ids', os.environ['INSTANCE_ID'],
              '--document-name', 'AWS-RunShellScript',
              '--comment', 'Deploy shared skills',
              '--parameters', json.dumps({'commands': [f'echo {script_b64} | base64 -d | bash']}),
              '--query', 'Command.CommandId', '--output', 'text'
          ], capture_output=True, text=True, check=True).stdout.strip()

          print(f'SSM Command: {cmd_id}')

          for i in range(30):
              time.sleep(10)
              result = subprocess.run([
                  'aws', 'ssm', 'list-command-invocations',
                  '--command-id', cmd_id, '--details',
                  '--query', 'CommandInvocations[0]'
              ], capture_output=True, text=True).stdout
              inv = json.loads(result)
              status = inv.get('Status', 'Unknown')
              print(f'  [{i+1}] {status}')
              if status == 'Success':
                  print('OK: Skills deployed')
                  exit(0)
              elif status in ('Failed', 'TimedOut'):
                  output = inv.get('CommandPlugins', [{}])[0].get('Output', '')
                  print(f'FAILED. Output:\n{output}')
                  exit(1)
          print('Timeout')
          exit(1)
          "
