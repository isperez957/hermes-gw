name: "Deploy — Backend (ECR + EC2)"

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: "Build & Deploy Backend"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::649091762015:role/terraform-ci-oidc
          aws-region: eu-west-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region eu-west-1 \
            | docker login --username AWS --password-stdin \
              "649091762015.dkr.ecr.eu-west-1.amazonaws.com"

      - name: Build & Push Docker image
        run: |
          IMAGE="649091762015.dkr.ecr.eu-west-1.amazonaws.com/hermes-gw-orchestrator"
          docker build -t "${IMAGE}:latest" .
          docker push "${IMAGE}:latest"

      - name: Get EC2 instance ID
        id: ec2
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=hermes-gw-app" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          echo "instance_id=${INSTANCE_ID}" >> $GITHUB_OUTPUT

      - name: Deploy to EC2 (SSM)
        run: |
          aws ssm send-command \
            --instance-ids "${{ steps.ec2.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --comment "hermes-gw orchestrator deploy" \
            --parameters '{
              "commands": [
                "aws ecr get-login-password --region eu-west-1 | docker login --username AWS --password-stdin 649091762015.dkr.ecr.eu-west-1.amazonaws.com",
                "docker compose -f /opt/hermes-gw/docker-compose.yml pull",
                "docker compose -f /opt/hermes-gw/docker-compose.yml up -d --remove-orphans"
              ],
              "executionTimeout": ["120"]
            }' \
            --output text --query "Command.CommandId"
